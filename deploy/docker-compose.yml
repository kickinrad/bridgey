  bridgey-warren:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - BRIDGEY_NAME=warren
      - BRIDGEY_PORT=8096
      - BRIDGEY_DESCRIPTION=Personal CFO — sharp, analytical, data-driven financial advisor
      - BRIDGEY_TOKEN=${BRIDGEY_TOKEN_WARREN}
      - BRIDGEY_MAX_TURNS=5
      - >-
        BRIDGEY_AGENTS=[{"name":"julia","url":"http://bridgey-julia:8092","token":"${BRIDGEY_TOKEN_JULIA}"},{"name":"mila","url":"http://bridgey-mila:8093","token":"${BRIDGEY_TOKEN_MILA}"},{"name":"bob","url":"http://bridgey-bob:8094","token":"${BRIDGEY_TOKEN_BOB}"},{"name":"nara","url":"http://bridgey-nara:8095","token":"${BRIDGEY_TOKEN_NARA}"}]
