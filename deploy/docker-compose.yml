      test: ["CMD", "curl", "-f", "http://127.0.0.1:8096/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  bridgey-discord:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.discord
    environment:
      - DISCORD_BOT_JULIA=${DISCORD_BOT_JULIA}
      - DISCORD_BOT_MILA=${DISCORD_BOT_MILA}
      - DISCORD_CONFIG_PATH=/app/discord-config.json
    volumes:
      - /opt/bridgey/discord-config.json:/app/discord-config.json:ro
    depends_on:
      - bridgey-julia
      - bridgey-mila
    restart: unless-stopped

volumes:
  julia-data:
  mila-data:
  bob-data:
  nara-data:
  warren-data:
