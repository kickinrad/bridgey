services:
  bridgey-julia:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - BRIDGEY_NAME=julia
      - BRIDGEY_PORT=8092
      - BRIDGEY_DESCRIPTION=Personal chef assistant inspired by Julia Child
      - BRIDGEY_TOKEN=${BRIDGEY_TOKEN_JULIA}
      - BRIDGEY_MAX_TURNS=5
      - >-
        BRIDGEY_AGENTS=[{"name":"mila","url":"http://bridgey-mila:8093","token":"${BRIDGEY_TOKEN_MILA}"},{"name":"bob","url":"http://bridgey-bob:8094","token":"${BRIDGEY_TOKEN_BOB}"},{"name":"nara","url":"http://bridgey-nara:8095","token":"${BRIDGEY_TOKEN_NARA}"},{"name":"warren","url":"http://bridgey-warren:8096","token":"${BRIDGEY_TOKEN_WARREN}"}]
    volumes:
      - /opt/bridgey/personas/julia:/workspace:ro
      - /opt/bridgey/auth:/home/node/.claude:ro
      - julia-data:/data/bridgey
    ports:
      - "8092:8092"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8092/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  bridgey-mila:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - BRIDGEY_NAME=mila
      - BRIDGEY_PORT=8093
      - BRIDGEY_DESCRIPTION=Personal brand strategist and creative advisor
      - BRIDGEY_TOKEN=${BRIDGEY_TOKEN_MILA}
      - BRIDGEY_MAX_TURNS=5
      - >-
        BRIDGEY_AGENTS=[{"name":"julia","url":"http://bridgey-julia:8092","token":"${BRIDGEY_TOKEN_JULIA}"},{"name":"bob","url":"http://bridgey-bob:8094","token":"${BRIDGEY_TOKEN_BOB}"},{"name":"nara","url":"http://bridgey-nara:8095","token":"${BRIDGEY_TOKEN_NARA}"},{"name":"warren","url":"http://bridgey-warren:8096","token":"${BRIDGEY_TOKEN_WARREN}"}]
    volumes:
      - /opt/bridgey/personas/mila:/workspace:ro
      - /opt/bridgey/auth:/home/node/.claude:ro
      - mila-data:/data/bridgey
    ports:
      - "8093:8093"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8093/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  bridgey-bob:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
