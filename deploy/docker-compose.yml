    volumes:
      - /opt/bridgey/personas/bob:/workspace:ro
      - /opt/bridgey/auth:/home/node/.claude:ro
      - bob-data:/data/bridgey
    ports:
      - "8094:8094"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8094/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  bridgey-nara:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - BRIDGEY_NAME=nara
      - BRIDGEY_PORT=8095
      - BRIDGEY_DESCRIPTION=Health and wellness coach — holistic wellbeing with warmth and evidence-based guidance
      - BRIDGEY_TOKEN=${BRIDGEY_TOKEN_NARA}
      - BRIDGEY_MAX_TURNS=5
      - >-
        BRIDGEY_AGENTS=[{"name":"julia","url":"http://bridgey-julia:8092","token":"${BRIDGEY_TOKEN_JULIA}"},{"name":"mila","url":"http://bridgey-mila:8093","token":"${BRIDGEY_TOKEN_MILA}"},{"name":"bob","url":"http://bridgey-bob:8094","token":"${BRIDGEY_TOKEN_BOB}"},{"name":"warren","url":"http://bridgey-warren:8096","token":"${BRIDGEY_TOKEN_WARREN}"}]
