# compose.snippet.yaml — agentgateway integration diff for Coolify
#
# HOW X1 APPLIES THIS:
#   - Section "NEW SERVICES" → add these service blocks to the existing compose
#     at /data/coolify/services/jgcko8w0o4gwoocs0cks8swo/
#   - Section "MODIFIED PERSONA SERVICES" → for each of the 5 persona services
#     (julia, mila, archer, bob, kai), merge the shown volumes + environment
#     entries into the existing service definition. Do not replace the whole
#     service — append these keys to the existing volumes/environment blocks.
#   - mealie-mcp image must be built on cloud first:
#       cd /data/coolify/services/jgcko8w0o4gwoocs0cks8swo
#       docker build -t mealie-mcp:latest -f mealie-mcp/Dockerfile ./mealie-mcp
#     (Front A pushes the Dockerfile; X1 runs the build before applying this)

# ─── NEW SERVICES ─────────────────────────────────────────────────────────────

services:
  mealie-mcp:
    image: mealie-mcp:latest
    pull_policy: never
    container_name: mealie-mcp-jgcko8w0o4gwoocs0cks8swo
    environment:
      - MCP_TRANSPORT=sse
      - MEALIE_BASE_URL=https://mealie.pleco-discus.ts.net
      - MEALIE_API_KEY=${MEALIE_API_KEY}
    restart: unless-stopped
    stdin_open: false
    tty: false
    # No public port — reachable only by agentgateway on the service network

  agentgateway:
    image: ghcr.io/agentgateway/agentgateway:1.1.0
    container_name: agentgateway-jgcko8w0o4gwoocs0cks8swo
    command: ["--config", "/config.yaml"]
    volumes:
      - ./agentgateway/config.yaml:/config.yaml:ro
      - /run/tailscale/tailscaled.sock:/run/tailscale/tailscaled.sock:ro
    restart: unless-stopped
    stdin_open: false
    tty: false
    # No public port — reachable from tailnet via tailscale serve, or
    # internally by persona containers at http://agentgateway:8090/mcp

# ─── MODIFIED PERSONA SERVICES ────────────────────────────────────────────────
# For each persona below, MERGE (append) these entries into the existing
# service's volumes: and environment: blocks. Container names follow the
# pattern bridgey-<name>-jgcko8w0o4gwoocs0cks8swo (existing Coolify naming).

  # julia
  bridgey-julia-jgcko8w0o4gwoocs0cks8swo:
    volumes:
      - /run/tailscale/tailscaled.sock:/run/tailscale/tailscaled.sock:ro
    environment:
      - BRIDGEY_AGENTGATEWAY_URL=http://agentgateway:8090/mcp
      - BRIDGEY_IDENTITY_MODE=tailscale

  # mila
  bridgey-mila-jgcko8w0o4gwoocs0cks8swo:
    volumes:
      - /run/tailscale/tailscaled.sock:/run/tailscale/tailscaled.sock:ro
    environment:
      - BRIDGEY_AGENTGATEWAY_URL=http://agentgateway:8090/mcp
      - BRIDGEY_IDENTITY_MODE=tailscale

  # archer
  bridgey-archer-jgcko8w0o4gwoocs0cks8swo:
    volumes:
      - /run/tailscale/tailscaled.sock:/run/tailscale/tailscaled.sock:ro
    environment:
      - BRIDGEY_AGENTGATEWAY_URL=http://agentgateway:8090/mcp
      - BRIDGEY_IDENTITY_MODE=tailscale

  # bob
  bridgey-bob-jgcko8w0o4gwoocs0cks8swo:
    volumes:
      - /run/tailscale/tailscaled.sock:/run/tailscale/tailscaled.sock:ro
    environment:
      - BRIDGEY_AGENTGATEWAY_URL=http://agentgateway:8090/mcp
      - BRIDGEY_IDENTITY_MODE=tailscale

  # kai
  bridgey-kai-jgcko8w0o4gwoocs0cks8swo:
    volumes:
      - /run/tailscale/tailscaled.sock:/run/tailscale/tailscaled.sock:ro
    environment:
      - BRIDGEY_AGENTGATEWAY_URL=http://agentgateway:8090/mcp
      - BRIDGEY_IDENTITY_MODE=tailscale
