# Remote agent container — generated by bridgey-deploy
# Placeholders: {name} = agent name
services:
  agent-{name}:
    image: bridgey-agent
    container_name: agent-{name}
    environment:
      - BRIDGEY_AGENT_NAME={name}
      - BRIDGEY_BIND=0.0.0.0
      - BRIDGEY_PORT=3000
    volumes:
      # Agent workspace (read-only — config, skills, CLAUDE.md)
      - /opt/bridgey/personas/{name}:/workspace:ro
      # Claude auth credentials (read-only — never bake into image)
      - /opt/bridgey/auth:/home/node/.claude:ro
      # Memory directory (read-write — overlays the ro workspace mount)
      - /opt/bridgey/personas/{name}/user/memory:/workspace/user/memory:rw
      # Persistent data volume (bridgey state, logs)
      - agent-{name}-data:/data
    restart: unless-stopped
    stdin_open: false
    tty: false

volumes:
  agent-{name}-data:
